<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lumocardco-hue | v3.0</title>
    <style>
        :root { --bg: #1a1a1a; --card: #2a2a2a; --accent: #007bff; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 420px; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #eee; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; margin-top: 30px; }
        label { grid-column: 1 / -1; text-align: left; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        button { background: #444; border: none; color: white; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #555; }
        .main-btn { grid-column: 1 / -1; background: var(--accent); font-weight: bold; padding: 15px; margin-top: 10px; }
        .main-btn:active { transform: scale(0.98); }
        canvas { border-radius: 10px; margin-top: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); max-width: 100%; height: auto !important; }
        #status { font-size: 0.7rem; color: var(--accent); margin-top: 10px; height: 1em; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>
</head>
<body>

    <div class="container">
        <h1>lumocardco-hue</h1>
        
        <div id="status">Ready</div>

        <div class="controls">
            <label>1. 背景デザインを選択</label>
            <button onclick="setBg('bg1.jpg')">背景 A</button>
            <button onclick="setBg('bg2.jpg')">背景 B</button>
        </div>

        <div class="controls">
            <label>2. 人物写真をアップロード (AI背景削除)</label>
            <input type="file" id="upload" accept="image/*" style="display:none">
            <button onclick="document.getElementById('upload').click()" class="main-btn">写真を選択する</button>
        </div>

        <div class="controls">
            <label>3. ステータス数字を選択</label>
            <button onclick="addBrandElement('99')">No. 99</button>
            <button onclick="addBrandElement('102')">No. 102</button>
        </div>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button onclick="downloadImage()" style="background:#28a745;">アップロード</button>
            <button onclick="resetCanvas()" style="background:#dc3545;">最初からやり直す</button>
        </div>

        <div id="form-section" style="display:none; margin-top:30px; width:100%; border-top:1px solid #444; padding-top:20px;">
            <label style="color:var(--accent); font-weight:bold; display:block; margin-bottom:15px; text-align:center;">
                4. 送付先情報を入力してください
            </label>
            
            <form style="display:flex; flex-direction:column; gap:15px;">
                <div>
                    <label style="display:block; font-size:0.9rem; margin-bottom:5px;">名前</label>
                    <input type="text" id="name" placeholder="山田太郎" style="width:100%; padding:8px; border-radius:5px; border:1px solid #555; background:#333; color:white; box-sizing:border-box;">
                </div>
                
                <div>
                    <label style="display:block; font-size:0.9rem; margin-bottom:5px;">郵便番号</label>
                    <input type="text" id="postal-code" placeholder="123-4567" onchange="fetchAddress()" style="width:100%; padding:8px; border-radius:5px; border:1px solid #555; background:#333; color:white; box-sizing:border-box;">
                </div>
                
                <div>
                    <label style="display:block; font-size:0.9rem; margin-bottom:5px;">郵便番号から分かる住所</label>
                    <input type="text" id="auto-address" placeholder="自動入力されます" readonly style="width:100%; padding:8px; border-radius:5px; border:1px solid #555; background:#2a2a2a; color:#888; box-sizing:border-box;">
                </div>
                
                <div>
                    <label style="display:block; font-size:0.9rem; margin-bottom:5px;">番地などの追加住所</label>
                    <input type="text" id="address" placeholder="1丁目2番3号" style="width:100%; padding:8px; border-radius:5px; border:1px solid #555; background:#333; color:white; box-sizing:border-box;">
                </div>
                
                <div>
                    <label style="display:block; font-size:0.9rem; margin-bottom:5px;">生まれた年</label>
                    <input type="number" id="birth-year" placeholder="1990" min="1900" max="2030" style="width:100%; padding:8px; border-radius:5px; border:1px solid #555; background:#333; color:white; box-sizing:border-box;">
                </div>
                
                <button type="button" onclick="submitForm()" style="background:var(--accent); grid-column:1/-1; font-weight:bold; padding:12px; margin-top:10px;">送信する</button>
            </form>
        </div>

    </div>



<script>
        // キャンバス初期化
        const canvas = new fabric.Canvas('canvas', {
            width: 400,
            height: 500,
            backgroundColor: '#ffffff',
            preserveObjectStacking: true // 重なり順を維持
        });

        const status = document.getElementById('status');

        // 背景セット関数
        function setBg(fileName) {
            status.textContent = `Loading ${fileName}...`;
            fabric.Image.fromURL(fileName + '?t=' + Date.now(), function(img, isError) {
                if (isError) {
                    alert("画像が見つかりません。ファイル名を確認してください。");
                    status.textContent = "Error";
                    return;
                }
                canvas.setBackgroundImage(img, function() {
                    canvas.renderAll();
                    status.textContent = "Background Set!";
                }, {
                    scaleX: canvas.width / img.width,
                    scaleY: canvas.height / img.height,
                    crossOrigin: 'anonymous'
                });
            });
        }

        // 人物アップロード & 背景削除
        document.getElementById('upload').onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            status.textContent = "AI Removing Background...";
            try {
                const blob = await imglyRemoveBackground(file);
                const url = URL.createObjectURL(blob);
                fabric.Image.fromURL(url, function(img) {
                    img.scaleToWidth(300);
                    canvas.add(img);
                    canvas.centerObject(img);
                    canvas.setActiveObject(img);
                    canvas.renderAll();
                    status.textContent = "Person Added!";
                });
            } catch (err) {
                status.textContent = "AI Error - Loading Original";
                const reader = new FileReader();
                reader.onload = f => fabric.Image.fromURL(f.target.result, img => {
                    img.scaleToWidth(300);
                    canvas.add(img);
                    canvas.centerObject(img);
                    canvas.renderAll();
                    status.textContent = "Person Added!";
                });
                reader.readAsDataURL(file);
            }
        };

        // ロゴ(icon.png)と数字を左下にセット
        function addBrandElement(num) {
            status.textContent = "Adding Branding...";
            
            // 既存のブランド要素を削除
            canvas.getObjects().forEach(obj => {
                if (obj.isBrand) canvas.remove(obj);
            });

            // ロゴ読み込み
            fabric.Image.fromURL('icon.png' + '?t=' + Date.now(), function(img) {
                img.set({
                    left: 20,
                    top: canvas.height - 140,
                    scaleX: 0.12,
                    scaleY: 0.12,
                    isBrand: true,
                    selectable: false
                });

                const text = new fabric.Text(num, {
                    left: 20,
                    top: canvas.height - 85,
                    fontSize: 70,
                    fill: '#ff0000',
                    fontWeight: 'bold',
                    fontFamily: 'Impact',
                    isBrand: true,
                    selectable: false
                });

                canvas.add(img, text);
                canvas.bringToFront(img);
                canvas.bringToFront(text);
                canvas.renderAll();
                status.textContent = "Branding Applied!";
            });
        }

        // 画像保存
        function downloadImage() {
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1 });
            const link = document.createElement('a');
            link.download = 'lumocard.png';
            link.href = dataURL;
            link.click();
            
            // フォームセクションを表示
            document.getElementById('form-section').style.display = 'block';
        }

        // フォーム送信関数
        function submitForm() {
            const name = document.getElementById('name').value;
            const postalCode = document.getElementById('postal-code').value;
            const autoAddress = document.getElementById('auto-address').value;
            const address = document.getElementById('address').value;
            const birthYear = document.getElementById('birth-year').value;
            
            if (!name || !postalCode || !autoAddress || !address || !birthYear) {
                alert('すべての項目を入力してください');
                return;
            }
            
            alert(`送信内容:\n名前: ${name}\n郵便番号: ${postalCode}\n住所: ${autoAddress}${address}\n生まれた年: ${birthYear}`);
            // ここで実際のサーバー送信処理を追加できます
        }

        // 郵便番号から住所を自動取得する関数
        function fetchAddress() {
            const postalCode = document.getElementById('postal-code').value;
            if (!postalCode || postalCode.length < 7) return;
            
            // ハイフンを削除
            const code = postalCode.replace('-', '');
            
            // 郵便番号から住所を取得（JSON API）
            fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${code}`)
                .then(response => response.json())
                .then(data => {
                    if (data.results && data.results.length > 0) {
                        const result = data.results[0];
                        const fullAddress = result.address1 + result.address2 + result.address3;
                        document.getElementById('auto-address').value = fullAddress;
                    } else {
                        document.getElementById('auto-address').value = '住所が見つかりません';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('auto-address').value = '取得失敗';
                });
        }

        // キャンバスを初期状態に戻す関数
function resetCanvas() {
    if (confirm("全ての作業を消去して、最初からやり直しますか？")) {
        location.reload();
    }
}
        
    </script>
</body>
</html>
