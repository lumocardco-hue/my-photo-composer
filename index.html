<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lumocardco-hue</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>lumocardco-hue</h1>
        <div class="controls">
            <button onclick="setBg('bg1.jpg')">背景A</button>
            <button onclick="setBg('bg2.jpg')">背景B</button>
        </div>
        <div class="controls">
            <button onclick="addNumber('99')">99</button>
            <button onclick="addNumber('102')">102</button>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = new fabric.Canvas('canvas', {
            width: 400,
            height: 500,
            backgroundColor: '#ffffff'
        });

function setBg(fileName) {
    // 1. 画像オブジェクトをメモリ上に作成
    fabric.Image.fromURL(fileName, function(img, isError) {
        if (isError) {
            alert("エラー: " + fileName + " が読み込めません。ファイル名を確認してください。");
            return;
        }

        // 2. 背景画像をセットし、セットが完了した「後」で確実に描画を更新する
        canvas.setBackgroundImage(img, function() {
            // 背景のサイズと位置を調整
            img.set({
                scaleX: canvas.width / img.width,
                scaleY: canvas.height / img.height,
                originX: 'left',
                originY: 'top'
            });
            // 画面を強制リフレッシュ
            canvas.renderAll();
            console.log("背景描画完了:", fileName);
        }, {
            crossOrigin: 'anonymous'
        });
    });
}
        function addNumber(text) {
            alert("数字 " + text + " を追加");
            const t = new fabric.Text(text, { left: 50, top: 50, fontSize: 80, fill: 'red' });
            canvas.add(t);
        }
    </script>
</body>
</html>
