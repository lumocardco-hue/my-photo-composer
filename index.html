<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lumocardco-hue</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>lumocardco-hue</h1>
        <div class="controls">
            <button onclick="setBg('bg1.jpg')">背景A</button>
            <button onclick="setBg('bg2.jpg')">背景B</button>
        </div>
        <div class="controls">
            <button onclick="addNumber('99')">99</button>
            <button onclick="addNumber('102')">102</button>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = new fabric.Canvas('canvas', {
            width: 400,
            height: 500,
            backgroundColor: '#ffffff'
        });

function setBg(fileName) {
    alert("ステップ1: " + fileName + " を読み込みます。");
    
    // 1. まず普通に画像オブジェクトを作る
    const imgElement = new Image();
    
    // 2. 読み込みが成功した時の処理
    imgElement.onload = function() {
        alert("ステップ2: 読み込み成功！キャンバスに描画します。");
        const fabricImg = new fabric.Image(imgElement);
        canvas.setBackgroundImage(fabricImg, canvas.renderAll.bind(canvas), {
            scaleX: canvas.width / imgElement.width,
            scaleY: canvas.height / imgElement.height
        });
    };

    // 3. 読み込みが失敗した時の処理
    imgElement.onerror = function() {
        alert("【エラー】 " + fileName + " が読み込めません。\nファイル名がGitHubと完全に一致（大文字小文字も）しているか確認してください。");
    };

    // 4. 画像の場所を指定（キャッシュ対策の呪文付き）
    imgElement.src = fileName + "?t=" + new Date().getTime();
}
        
        alert("読み込み成功！画面を確認してください。");
    }, { crossOrigin: 'anonymous' });
}

        function addNumber(text) {
            alert("数字 " + text + " を追加");
            const t = new fabric.Text(text, { left: 50, top: 50, fontSize: 80, fill: 'red' });
            canvas.add(t);
        }
    </script>
</body>
</html>
