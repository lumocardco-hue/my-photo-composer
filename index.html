<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lumocardco-hue</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>lumocardco-hue</h1>
        <div class="controls">
            <button onclick="setBg('bg1.jpg')">背景A</button>
            <button onclick="setBg('bg2.jpg')">背景B</button>
        </div>
        <div class="controls">
            <button onclick="addNumber('99')">99</button>
            <button onclick="addNumber('102')">102</button>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = new fabric.Canvas('canvas', {
            width: 400,
            height: 500,
            backgroundColor: '#ffffff'
        });

function setBg(fileName) {
    console.log("読み込み開始:", fileName);
    
    // 1. まずimg要素を作る
    const imgElement = new Image();
    
    // 2. 読み込み成功時の処理
    imgElement.onload = function() {
        console.log("画像読み込み成功:", fileName);
        const fabricImg = new fabric.Image(imgElement);
        
        canvas.setBackgroundImage(fabricImg, function() {
            canvas.renderAll();
        }, {
            scaleX: canvas.width / imgElement.width,
            scaleY: canvas.height / imgElement.height,
            originX: 'left',
            originY: 'top'
        });
        alert("背景を設定しました");
    };
    
    // 3. 読み込み失敗時の処理
    imgElement.onerror = function() {
        alert("【エラー】 " + fileName + " が見つかりません。");
        console.error("画像読み込み失敗:", fileName);
    };
    
    // 4. 画像を指定（キャッシュ対策付き）
    imgElement.src = fileName + "?t=" + new Date().getTime();
}

        function addNumber(text) {
            alert("数字 " + text + " を追加");
            const t = new fabric.Text(text, { left: 50, top: 50, fontSize: 80, fill: 'red' });
            canvas.add(t);
        }
    </script>
</body>
</html>
