<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>写真の作成</title>

    <style>
      :root {
        --bg: #1a1a1a;
        --card: #2a2a2a;
        --accent: #007bff;
      }

      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        background: var(--bg);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        margin: 0;
      }

      .container {
        background: var(--card);
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 420px;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        color: #eee;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 15px;
        margin-top: 30px;
      }

      label {
        grid-column: 1 / -1;
        text-align: left;
        font-size: 0.8rem;
        color: #888;
        margin-bottom: 5px;
      }

      button {
        background: #444;
        border: none;
        color: white;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
      }
      button:hover {
        background: #555;
      }

      /* 画像選択エリアのスタイル（4列グリッド） */
      #bg-container,
      #logo-container,
      #frame-container,
      #status-container {
        display: grid;
        grid-template-columns: repeat(4, 1fr); /* 横に4つずつアイテムを並べる */
        gap: 10px;
        padding: 10px;
        background: #222;
        border-radius: 10px;
      }

      .main-btn {
        grid-column: 1 / -1;
        background: var(--accent);
        font-weight: bold;
        padding: 15px;
        margin-top: 10px;
      }
      .main-btn:active {
        transform: scale(0.98);
      }

      /* 動的に生成される画像ボタンのスタイル */
      .img-btn {
        width: 100%;
        aspect-ratio: 3/4; /* アスペクト比を3:4に */
        background-size: cover;
        background-position: center;
        border-radius: 8px;
        padding: 0;
        border: none;
        cursor: pointer;
      }

      /* 数字ボタンのスタイル調整 */
      #status-container button {
        font-weight: bold;
        font-size: 1rem; /* 少し小さく */
        aspect-ratio: 1/1; /* 正方形に */
        width: 100%;
        height: auto;
      }

      /* 古い .logo-options, .bg-select は上記に統合 */
      #status {
        font-size: 0.7rem;
        color: var(--accent);
        margin-top: 10px;
        height: 1em;
      }

      canvas {
        max-width: 100%;
        height: auto;
        margin-top: 20px;
        border-radius: 10px;
      }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>
  </head>
  <body>
    <div class="container">
      <div
        id="version-display"
        style="
          position: absolute;
          top: 10px;
          right: 10px;
          font-size: 12px;
          color: #666;
        "
      ></div>
      <div style="text-align: center">
        <h1>写真の作成</h1>
        <div id="status">Ready</div>

        <!-- 1. 背景デザインを選択 -->
        <div class="controls">
          <label>1. 背景デザインを選択</label>
        </div>
        <div id="bg-container" class="controls bg-select">
          <!-- スプレッドシートから自動生成 -->
        </div>
      </div>

      <!-- 2. 人物写真をアップロード -->
      <div class="controls">
        <label>2. 人物写真をアップロード</label>
        <input type="file" id="upload" accept="image/*" style="display: none" />
        <button
          onclick="document.getElementById('upload').click()"
          class="main-btn"
        >
          写真を選択する
        </button>
      </div>

      <!-- 3. ステータスを選択 -->
      <div class="controls">
        <!--3. ステータスを選択-->

        <label>3. ステータスを選択</label>

        <button onclick="addBrandElement('99')">99</button>
        <button onclick="addBrandElement('102')">102</button>
        <select
          id="position-select"
          onchange="updatePositionText()"
          style="
            grid-column: 1 / -1;
            padding: 10px;
            border-radius: 8px;
            background: #444;
            color: white;
            border: none;
            margin-bottom: 10px;
          "
        >
          <option value="FW">FW (フォワード)</option>
          <option value="MF">MF (ミッドフィルダー)</option>
          <option value="DF">DF (ディフェンダー)</option>
          <option value="GK">GK (ゴールキーパー)</option>
        </select>
      </div>

      <!-- 4. ロゴの選択 -->
      <div class="logo-selection-container">
        <label>4. ロゴの選択</label>
        <div id="logo-container" class="logo-options">
          <!-- スプレッドシートから自動生成 -->
        </div>
      </div>

      <!-- 5. 枠の選択 -->
      <div>
        <label>5. 枠の選択</label>
        <div id="frame-container" class="controls bg-select">
          <!-- スプレッドシートから自動生成 -->
        </div>
      </div>

      <canvas id="canvas"></canvas>

      <div class="controls">
        <button onclick="showAddressForm()" style="background: #28a745">
          送付先入力へ
        </button>
        <button onclick="resetCanvas()" style="background: #dc3545">
          最初からやり直す
        </button>
      </div>

      <!-- 送付先フォーム -->
      <div
        id="form-section"
        style="
          display: none;
          margin-top: 30px;
          width: 100%;
          border-top: 1px solid #444;
          padding-top: 20px;
        "
      >
        <label
          style="
            color: var(--accent);
            font-weight: bold;
            display: block;
            margin-bottom: 15px;
            text-align: center;
          "
        >
          送付先情報を入力してください
        </label>
        <form style="display: flex; flex-direction: column; gap: 15px">
          <div id="form-errors" style="color: #ff4d4d; font-size: 0.9rem"></div>
          <div>
            <label>名前</label>
            <input
              type="text"
              id="name"
              style="
                width: 100%;
                padding: 8px;
                border-radius: 5px;
                border: 1px solid #555;
                background: #333;
                color: white;
                box-sizing: border-box;
              "
            />
          </div>

          <div>
            <label>郵便番号</label>
            <input
              type="text"
              id="postal-code"
              onchange="fetchAddress()"
              style="
                width: 100%;
                padding: 8px;
                border-radius: 5px;
                border: 1px solid #555;
                background: #333;
                color: white;
                box-sizing: border-box;
              "
            />
          </div>
          <div>
            <label>住所</label>
            <input
              type="text"
              id="auto-address"
              readonly
              style="
                width: 100%;
                padding: 8px;
                border-radius: 5px;
                border: 1px solid #555;
                background: #2a2a2a;
                color: #888;
                box-sizing: border-box;
              "
            />
            <input
              type="text"
              id="address"
              placeholder="番地・マンション名"
              style="
                width: 100%;
                padding: 8px;
                border-radius: 5px;
                border: 1px solid #555;
                background: #333;
                color: white;
                box-sizing: border-box;
                margin-top: 5px;
              "
            />
          </div>
          <div>
            <label>生まれた年</label>
            <input
              type="number"
              id="birth-year"
              placeholder="1990"
              min="1900"
              max="2030"
              style="
                width: 100%;
                padding: 8px;
                border-radius: 5px;
                border: 1px solid #555;
                background: #333;
                color: white;
                box-sizing: border-box;
              "
            />
          </div>
          <div style="text-align: center">
            <label
              ><input type="checkbox" id="agree-terms" />
              利用規約に同意する</label
            >
          </div>
          <button
            type="button"
            onclick="showConfirmModal()"
            id="submit-btn"
            style="width: 100%; padding: 15px; background-color: #007bff"
          >
            内容を確認して注文する
          </button>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
